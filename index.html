<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Survey...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Variables will be populated by JavaScript dynamically */
    :root {
      --primary: #1A4685;
      --secondary: #E5E7EB;
      --accent: #111827;
      --bg: #F3F4F6;
      --text: #374151;
      --radius: 12px;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 10px;
    }
    .card {
      border-radius: var(--radius);
      padding: 32px;
      width: 100%; max-width: 550px;
      background-color: #FFFFFF;
    }
    .pill {
      border: 2px solid var(--secondary);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .pill-selected {
      background-color: var(--primary) !important;
      border-color: var(--primary) !important;
      color: white !important;
    }
    input[type=range] { accent-color: var(--primary); }
    .btn-primary { background-color: var(--primary); color: #FFFFFF; }

    /* Success Screen Buttons */
    .resource-btn {
      display: block; text-align: center; padding: 14px; background-color: var(--primary);
      color: white; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 12px;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: slideUp 0.4s ease-out forwards; }
    
    /* Loading Spinner */
    .loader {
      border: 4px solid var(--secondary);
      border-top: 4px solid var(--primary);
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loadingScreen" class="flex flex-col items-center justify-center py-24">
      <img src="https://datainformed.github.io/FeedbackTool/datainformed.gif" 
           alt="Loading..." 
           class="h-24 w-auto mb-4">
      <p class="text-lg font-semibold text-gray-600 animate-pulse">Loading Survey...</p>
    </div>

  <div class="shadow-2xl card my-8 hidden" id="mainContainer">
    <div class="flex justify-center mb-6" id="logoBox">
      <img id="app-logo" src="logo.png" class="max-h-[100px] object-contain" alt="Logo" onerror="this.style.display='none'">
    </div>

    <div id="formContent">
      <h2 id="formTitle" class="text-3xl font-black mb-2 text-center" style="color: var(--accent);"></h2>
      <p id="formInstructions" class="mb-8 italic text-center px-4 opacity-60"></p>

      <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
      
      <form id="feedbackForm" method="POST" target="hidden_iframe" onsubmit="handleFormSubmit(this)">
      <input type="hidden" name="tag" id="tagInput" value="">

        <div class="space-y-4 mb-8">
          <div>
            <label class="block text-sm font-bold opacity-70 mb-1">Name <span class="text-red-500">*</span></label>
            <input type="text" name="userName" placeholder="Your Name" required class="block w-full border-2 rounded-xl p-4 bg-gray-50 outline-none focus:ring-2 focus:ring-offset-1 transition-all" style="border-color: var(--secondary);">
          </div>
          <div>
            <label class="block text-sm font-bold opacity-70 mb-1">Email Address <span class="text-red-500">*</span></label>
            <input type="email" name="emailId" placeholder="your@email.com" required class="block w-full border-2 rounded-xl p-4 bg-gray-50 outline-none focus:ring-2 focus:ring-offset-1 transition-all" style="border-color: var(--secondary);">
          </div>
        </div>

        <div id="questionsContainer" class="space-y-12 mb-10"></div>

        <div class="mb-8">
          <label class="block font-bold text-sm mb-2" style="color: var(--accent);">Any other comments? (Optional)</label>
          <textarea name="comments" rows="3" class="w-full border-2 rounded-xl p-3 bg-gray-50 outline-none focus:ring-2 transition-all" style="border-color: var(--secondary);"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl font-black text-lg shadow-lg hover:opacity-90 transition-all btn-primary">
          Submit Response
        </button>
      </form>
    </div>

    <div id="successMsg" class="hidden text-center py-8">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-2xl font-black mb-2" style="color: var(--accent);">Thank You!</h3>
      <p class="opacity-70 mb-8">Your response has been recorded successfully.</p>

      <div id="resourceContainer" class="hidden bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200 text-left">
        <h4 class="font-black text-sm uppercase mb-3 text-gray-500">Available Resources:</h4>
        <div id="resourceText" class="text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    // 1. ADD YOUR DEPLOYED APPS SCRIPT WEB APP URL HERE
    // =========================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4R7ev2oiUF-3Y3BpD-riOKeS4hI3QBY7bZBca2BNzV5fNYQMPT87blUNNwLM81IVv/exec"; 
    
    let currentSessionData = null; // Stores email resources for later

    // Initialization on page load
    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const tag = urlParams.get('tag') || 'General Feedback';
      
      try {
        const response = await fetch(`${SCRIPT_URL}?tag=${tag}`);
        const data = await response.json();
        
        currentSessionData = data.sessionData;
        applySettings(data.style, data.appName);
        buildQuestions(data.sessionData.questions, data.style);

        document.getElementById('feedbackForm').action = SCRIPT_URL;
        
        document.getElementById('formTitle').innerText = data.sessionData.title;
        document.getElementById('formInstructions').innerText = data.sessionData.instructions;
        document.getElementById('tagInput').value = tag;



// NEW: Handle Anonymous UI
        if (data.sessionData.isAnonymous) {
          const userNameInput = document.getElementsByName('userName')[0];
          const emailInput = document.getElementsByName('emailId')[0];
          
          userNameInput.parentElement.style.display = 'none';
          emailInput.parentElement.style.display = 'none';
          
          userNameInput.removeAttribute('required');
          emailInput.removeAttribute('required');
          
          userNameInput.value = 'Anonymous';
          emailInput.value = 'anonymous@school.com';
        }




        // Switch views
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainContainer').classList.remove('hidden');
        document.getElementById('mainContainer').classList.add('animate-in');
        document.body.style.opacity = "1";

      } catch (error) {
        document.getElementById('loadingScreen').innerHTML = `<p class="text-red-500 font-bold">Error loading session. Please check your link.</p>`;
        document.body.style.opacity = "1";
      }
    };

    function applySettings(style, appName) {
      document.title = appName || "Feedback Tool";
      const root = document.documentElement;
      
      // Inject CSS variables [cite: 216-222]
      if(style.COLOR_PRIMARY) root.style.setProperty('--primary', style.COLOR_PRIMARY);
      if(style.COLOR_SECONDARY) root.style.setProperty('--secondary', style.COLOR_SECONDARY);
      if(style.COLOR_ACCENT) root.style.setProperty('--accent', style.COLOR_ACCENT);
      if(style.COLOR_BG) root.style.setProperty('--bg', style.COLOR_BG);
      if(style.COLOR_TEXT) root.style.setProperty('--text', style.COLOR_TEXT);
      if(style.CARD_RADIUS) root.style.setProperty('--radius', style.CARD_RADIUS + 'px');

      // Dynamically load Google Font [cite: 214]
      if(style.FONT_FAMILY) {
        const fontLink = document.createElement('link');
        fontLink.href = `https://fonts.googleapis.com/css2?family=${style.FONT_FAMILY}:wght@400;700;900&display=swap`;
        fontLink.rel = 'stylesheet';
        document.head.appendChild(fontLink);
        document.body.style.fontFamily = `'${style.FONT_FAMILY}', sans-serif`;
      }
    }

    // Replicates your Google Apps Script 'for' loop in pure JavaScript [cite: 289-346]
 function buildQuestions(questions, style) {
  const container = document.getElementById('questionsContainer');
  let html = '';

  // NEW: Calculate the dynamic sentinel value (midpoint + 0.1)
  const min = parseFloat(style.SCALE_MIN || 0);
  const max = parseFloat(style.SCALE_MAX || 100);
  const sentinel = ((min + max) / 2) + 0.1;

  questions.forEach((q, i) => {
    // NEW: Add (optional) tag and ID to container for validation highlighting
    const optionalTag = q.isOptional ? ' <span class="text-xs opacity-50 italic font-normal">(optional)</span>' : ' <span class="text-red-500">*</span>';
    
    html += `<div class="px-2 py-4 transition-all duration-300 question-block" id="container_${i}">
             <label class="block font-bold text-sm mb-4" style="color: var(--accent);">${q.label}${optionalTag}</label>
             <input type="hidden" name="q_text_${i}" value="${q.label}">`;

    if (q.type === 'slider') {
      html += `<div class="flex justify-between items-center mb-2">
               <span class="text-xs font-bold opacity-40 uppercase tracking-tighter w-1/3 text-left leading-tight">${q.minLabel || style.SCALE_MIN}</span>
               <span id="val_${i}" class="text-xl font-black w-1/3 text-center" style="color: var(--primary);">${Math.floor(sentinel)}</span>
               <span class="text-xs font-bold opacity-40 uppercase tracking-tighter w-1/3 text-right leading-tight">${q.maxLabel || style.SCALE_MAX}</span>
               </div>
               <input type="range" name="q_val_${i}" min="${style.SCALE_MIN}" max="${style.SCALE_MAX}" value="${sentinel}" step="1" data-sentinel="${sentinel}" class="w-full h-3 rounded-lg appearance-none cursor-pointer bg-gray-100" oninput="document.getElementById('val_${i}').innerText = this.value">`;

    } else if (q.type === 'text') {
      html += `<textarea name="q_val_${i}" rows="3" placeholder="Type your answer here..." class="w-full border border-gray-200 rounded-xl p-3 bg-gray-50 outline-none focus:ring-2"></textarea>`;
    } else if (q.type === 'drop') {
      html += `<select name="q_val_${i}" class="w-full border border-gray-200 rounded-xl p-3 bg-gray-50 outline-none focus:ring-2 cursor-pointer appearance-none">
               <option value="" disabled selected>Select an option...</option>`;
      q.options.forEach(opt => html += `<option value="${opt}">${opt}</option>`);
      html += `</select>`;
    } else if (q.type === 'check') {
      html += `<input type="hidden" name="q_val_${i}" id="hidden_q_${i}"><div class="flex flex-col gap-3 mt-2">`;
      q.options.forEach(opt => {
        html += `<label class="flex items-center space-x-3 cursor-pointer p-2 rounded-lg hover:bg-gray-100 transition-colors">
                 <input type="checkbox" value="${opt}" class="w-5 h-5 cursor-pointer check-group-${i}" style="accent-color: var(--primary);" onchange="updateCheckboxValue(${i})">
                 <span class="text-sm font-bold opacity-80">${opt}</span>
                 </label>`;
      });
      html += `</div>`;
    } else {
      html += `<input type="hidden" name="q_val_${i}" id="hidden_q_${i}"><div class="flex flex-wrap gap-2">`;
      q.options.forEach(opt => {
        html += `<div onclick="selectPill(${i}, '${opt}', this)" class="pill px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:bg-gray-50">${opt}</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  container.innerHTML = html;
}

    // Interactive element handlers [cite: 377-392]
    function selectPill(qIndex, value, element) {
      document.getElementById('hidden_q_' + qIndex).value = value;
      const siblings = element.parentElement.children;
      for (let i = 0; i < siblings.length; i++) siblings[i].classList.remove('pill-selected');
      element.classList.add('pill-selected');
    }

    function updateCheckboxValue(qIndex) {
      const checkboxes = document.querySelectorAll('.check-group-' + qIndex + ':checked');
      const values = Array.from(checkboxes).map(cb => cb.value);
      document.getElementById('hidden_q_' + qIndex).value = values.join(' | ');
    }

  // Form submission
 function handleFormSubmit(form) {
  let isValid = true;

  // PASS 1: Validate all questions
  currentSessionData.questions.forEach((q, i) => {
    let isAnswered = true;
    
    if (q.type === 'slider') {
      const slider = form.querySelector(`input[name="q_val_${i}"]`);
      if (slider && slider.value === slider.dataset.sentinel) isAnswered = false;
    } else if (q.type === 'text') {
      const text = form.querySelector(`textarea[name="q_val_${i}"]`);
      if (!text || !text.value.trim()) isAnswered = false;
    } else if (q.type === 'drop') {
      const drop = form.querySelector(`select[name="q_val_${i}"]`);
      if (!drop || !drop.value) isAnswered = false;
    } else {
      const hidden = document.getElementById(`hidden_q_${i}`);
      if (!hidden || !hidden.value) isAnswered = false;
    }

    // Highlight missing compulsory questions
    const container = document.getElementById(`container_${i}`);
    if (!q.isOptional && !isAnswered) {
      isValid = false;
      container.classList.add('bg-red-50', 'ring-2', 'ring-red-200', 'rounded-xl');
    } else {
      container.classList.remove('bg-red-50', 'ring-2', 'ring-red-200', 'rounded-xl');
    }
  });

  if (!isValid) {
    alert("Please answer all required questions highlighted in red.");
    return false; // Stop the form submission
  }

  // PASS 2: Inject "Skipped" for untouched optional questions
  currentSessionData.questions.forEach((q, i) => {
    let targetInput;
    let isUntouched = false;

    if (q.type === 'slider') {
      targetInput = form.querySelector(`input[name="q_val_${i}"]`);
      if (targetInput && targetInput.value === targetInput.dataset.sentinel) isUntouched = true;
    } else if (q.type === 'text') {
      targetInput = form.querySelector(`textarea[name="q_val_${i}"]`);
      if (targetInput && !targetInput.value.trim()) isUntouched = true;
    } else if (q.type === 'drop') {
      targetInput = form.querySelector(`select[name="q_val_${i}"]`);
      if (targetInput && !targetInput.value) isUntouched = true;
    } else {
      targetInput = document.getElementById(`hidden_q_${i}`);
      if (targetInput && !targetInput.value) isUntouched = true;
    }

    // If it's optional and blank, dynamically insert the word "Skipped"
    if (q.isOptional && isUntouched && targetInput) {
       const hiddenSkipped = document.createElement('input');
       hiddenSkipped.type = 'hidden';
       hiddenSkipped.name = targetInput.name; // Steal the name attribute
       hiddenSkipped.value = 'Skipped';
       form.appendChild(hiddenSkipped);
       targetInput.removeAttribute('name'); // Prevent the empty input from submitting
    }
  });

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = "Saving...";

  setTimeout(() => {
    document.getElementById('formContent').style.display = 'none';
    document.getElementById('logoBox').style.display = 'none';

    let bodyContent = currentSessionData.emailBody;
    if (bodyContent && bodyContent.trim().length > 0) {
      const container = document.getElementById('resourceContainer');
      const textDiv = document.getElementById('resourceText');
      bodyContent = bodyContent.replace(/^["“”]+|["“”]+$/g, '');
      let html = bodyContent.replace(/\[([^,]+),\s*([^\]]+)\]/g, `<a href="$2" target="_blank" class="resource-btn">$1</a>`);
      textDiv.innerHTML = html.replace(/\n/g, '<br>');
      container.classList.remove('hidden');
    }

    document.getElementById('successMsg').classList.remove('hidden');
    window.scrollTo(0,0);
  }, 1000);

  return true; 
}
  </script>
</body>
</html>
